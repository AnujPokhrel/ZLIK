host: "localhost"
port: 25252
map: "smallgrid"
scenario_name: "rockbouncer_data_gen"

run_time_s: 20 # total simulation duration
sim_frequency: 20                     
num_trials: 90               # number of trials to run

spawn_box:                     # random spawn area (meters)
  x: [0, 0] 
  y: [0, 0]                 # min/max bounds
  z: [5, 15]   # near ground; BeamNG will settle suspension

vehicle_pool:                  # randomly sampled each episode
  # - {model: "etk800", color: "White"}
  - {model: "rockbouncer", color: "Orange"}
  # - {model: "pessima", color: "Blue"}

vehicle_params:                # approximate kinematics per vehicle
  etk800: {L: 2.70, max_steer_rad: 0.60}
  rockbouncer: {L: 2.90, max_steer_rad: 0.70}
  pessima: {L: 2.65, max_steer_rad: 0.60}
  _default: {L: 2.70, max_steer_rad: 0.60}

# CTRV/CTRA sampling
#probabilities of each mode (CTRV=constant velocity, CTRA=constant turn rate)
mode_probs: {CTRV: 0.40, CTRA: 0.60}
segment_rate_hz: 0.8           # Poisson change-points (avg changes/sec)

v_bounds: [0.0, 9.0]           # m/s
a_bounds: [-1.0, 2.5]          # m/s^2
omega_bounds: [-1.0, 1.0]      # rad/s

a_sigma: 0.2                   # small Gaussian noise per step
omega_sigma: 0.05              # small Gaussian noise per step

a_to_throttle_gain: 0.30       # throttle ≈ gain * (a + bias), clipped
throttle_bias: 0.15             # helps keep rolling
max_decel_for_brake: 6.0       # scale negative a → brake in [0,1]

throttle_bounds: [0.0, 0.20]
brake_bounds: [0.0, 1.0]

out_pickle: "ctrv_a"
out_pickle_folder: 'GeneratedData/Experiments/etk/'
log_every_n_steps: 1

#Angle to spawn the vehicle from a height
spawn_angle: [[1.8, 1.2, 0.99, 3.0], [1.8, -1.2, 0.99, 3.0], [-1.8, 1.2, 0.99, 3.0], [-1.8, -1.2, 0.99, 3.0]]
spawn_angle_sigma: 0.3
damage_pool: {
              tyre_puncture: 1.0, 
              fall: 1.0,    #       1.0, 
              tyre&shock&spring: 1.0, # 1.0,
              multi_tss: 1.0,  #0.2
              axle_break: 1.0,  #0.1
              none: 1.0
              }

